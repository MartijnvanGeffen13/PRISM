# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: prism
metadata:
  template: prism@1.0.0

services:
  exchange:
    project: ./src/exchange
    language: python
    host: function
  sharepoint:
    project: ./src/sharepoint
    language: python
    host: function
  dlp:
    project: ./src/dlp
    language: python
    host: function
  general:
    project: ./src/general
    language: python
    host: function
  azuread:
    project: ./src/azuread
    language: python
    host: function
  entrausers:
    project: ./src/entrausers
    language: python
    host: function

# After infrastructure is provisioned, apply the Data Lake NSP inbound IP rule
# from DATA_LAKE_ALLOWED_IPS. This runs outside the ARM deployment because the
# NSP provider cannot write an IP rule and a subscription rule in the same
# deployment (see scripts/set-datalake-nsp-ip-rule.ps1).
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/set-datalake-nsp-ip-rule.ps1
      continueOnError: false
      interactive: false
    posix:
      shell: pwsh
      run: ./scripts/set-datalake-nsp-ip-rule.ps1
      continueOnError: false
      interactive: false
